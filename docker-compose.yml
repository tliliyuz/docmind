# ============================================================
# DocMind — Docker Compose 服务编排
# ============================================================
# 4 个服务：
#   mysql   — MySQL 8.0 关系数据库
#   redis   — Redis 7.0 缓存 + Celery Broker
#   backend — FastAPI 后端（端口 8000）
#   celery  — Celery Worker（文档入库异步任务）
# 前端由宿主机 Nginx 直接托管静态文件，不参与 Docker Compose
#
# 资源约束（2核2G 小服务器）：
#   mem_limit 是 compose v2 顶层字段，限制单个容器最大内存。
#   注：deploy.resources.limits 仅在 Docker Swarm 下生效，
#       普通 docker compose up 会被忽略，故此处不用。
#
# 快速启动：
#   cp backend/.env.example backend/.env
#   # 编辑 backend/.env 填入实际凭证
#   docker-compose up -d --build
#   docker-compose exec backend alembic upgrade head
#
# 停止：docker-compose down
# 清理：docker-compose down -v  （⚠️ 删除所有持久化数据）
# ============================================================

services:
  # ── MySQL 8.0 ──
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    mem_limit: 384m
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Redis 7.0 ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 64m
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI 后端 ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    # 2核2G 服务器：单 worker，避免 4 worker 各自加载 ChromaDB 导致 OOM 死循环
    # （command 覆盖 Dockerfile 里的 --workers 4，无需重新 build 镜像）
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    mem_limit: 640m
    env_file:
      - backend/.env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - chroma_data:/app/chroma_data
      - upload_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Celery Worker（文档入库异步任务）──
  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    mem_limit: 256m
    env_file:
      - backend/.env
    volumes:
      - chroma_data:/app/chroma_data
      - upload_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Linux 容器使用默认 prefork pool（多进程并发），无需 --pool=solo
    # 2核2G 服务器：单 worker，避免多进程导致 OOM（入库任务排队处理即可）
    command: celery -A app.ingest.celery_app worker --loglevel=info --concurrency=1

# ── 持久化卷 ──
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local
  upload_data:
    driver: local
