# DocMind Nginx 配置（宿主机版）
# 用途：托管前端静态文件 + API 反向代理到 Docker 后端
# 部署路径：/etc/nginx/sites-available/docmind → /etc/nginx/sites-enabled/

# Gzip 压缩（减少传输体积）
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

server {
    listen 80;
    server_name www.yuerzen.top 47.118.24.224;

    # 上传文件大小限制（与 UPLOAD_MAX_SIZE 一致）
    client_max_body_size 50m;

    # ── API 反向代理 → Docker 后端（127.0.0.1:8000）──
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式传输支持（关键配置）
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── 静态资源（由 scp 上传到 /var/www/docmind/）──
    location / {
        root /var/www/docmind;
        # Vite 构建产物包含内容哈希的文件可长期缓存
        expires 1y;
        add_header Cache-Control "public, immutable";
        # SPA fallback：前端路由交回 Vue Router 处理
        try_files $uri $uri/ /index.html;
    }

    # SPA 入口不缓存（确保用户始终获取最新版本）
    location = /index.html {
        root /var/www/docmind;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
