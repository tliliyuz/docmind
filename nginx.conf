# DocMind Nginx 配置
# 功能：静态资源托管 + API 反向代理 + SSE 流式传输支持 + SPA 路由 fallback

# Gzip 压缩（减少传输体积）
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

server {
    listen 80;
    server_name _;

    # 上传文件大小限制（与 UPLOAD_MAX_SIZE 一致）
    client_max_body_size 50m;

    # ── API 反向代理 → FastAPI 后端 ──
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式传输支持（关键配置）
        # 关闭代理缓冲：LLM 生成的 token 实时推送到客户端，不攒批
        proxy_buffering off;
        proxy_cache off;
        # 关闭分块编码转换：SSE 使用 chunked transfer，Nginx 不应二次编码
        chunked_transfer_encoding off;
        # HTTP/1.1 保持长连接（SSE 依赖持久连接）
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # 超时设置：SSE 流式输出可能持续 30s+
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── 静态资源 ──
    location / {
        root /usr/share/nginx/html;
        # Vite 构建产物包含内容哈希的文件可长期缓存
        expires 1y;
        add_header Cache-Control "public, immutable";
        # SPA fallback：未匹配到的路径返回 index.html，由 Vue Router 处理前端路由
        try_files $uri $uri/ /index.html;
    }

    # SPA 入口不缓存（确保用户始终获取最新版本）
    location = /index.html {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
